<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عدسة أبشر | AbsherLens</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <header>
        <h1 style="color: var(--absher-green);">عدسة أبشر</h1>
        <p class="subtitle">خدمة ذكية لتحليل الإشعارات وتوجيهك للإجراء الصحيح</p>
    </header>

        <label for="imageUpload" class="upload-area" id="dropZone">
            <div id="uploadPlaceholder">
                <span class="upload-icon">📤</span>
                <p>قم برفع صورة الإشعار أو الرسالة</p>
                <small>يدعم JPG, PNG</small>
            </div>
            <input type="file" id="imageUpload" accept="image/*">
        </label>

        <div id="result"></div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
